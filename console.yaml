apiVersion: v1
kind: Console
metadata:
  canvasId: 00000000-0000-0000-0000-000000000000
  name: Cluster Autoscaler
spec:
  panels:
    - id: header
      type: markdown
      content:
        body: >
          **Generic worker-fleet autoscaler** running on Hetzner Cloud.


          - **Autoscale UP** — Grafana `HighCPU` alert fires → a new `cpx21` node is provisioned, Docker installed,
          workload container started.

          - **Autoscale DOWN** — every 10 min, if 30-min avg CPU is low and we're above the floor (2 nodes), the newest
          node is reclaimed.

          - **Node ledger** — every provisioned worker is recorded in memory namespace `cluster_nodes`
          (cluster=`workers`).


          > **Min:** 2 nodes &nbsp;&nbsp;•&nbsp;&nbsp; **Max:** 6 nodes &nbsp;&nbsp;•&nbsp;&nbsp; **Server type:**
          `cpx21` (3 vCPU / 4 GB) &nbsp;&nbsp;•&nbsp;&nbsp; **Region:** `nbg1`
        title: Cluster Autoscaler
    - id: kpis
      type: number
      content:
        metrics:
          - dataSource:
              kind: memory
              namespace: cluster_nodes
            render:
              aggregation: count
              format: number
              kind: number
              label: Active nodes
          - dataSource:
              kind: runs
            render:
              aggregation: count
              format: number
              kind: number
              label: Total runs
        title: Cluster KPIs
    - id: cluster_nodes
      type: table
      content:
        dataSource:
          kind: memory
          namespace: cluster_nodes
        render:
          columns:
            - field: server_name
              format: code
              label: Server
            - field: ipv4
              format: code
              label: IPv4
            - field: triggered_by
              format: badge
              label: Triggered by
            - field: created_at
              format: relative
              label: Created
          kind: table
        title: Cluster Nodes (live)
    - id: key_nodes
      type: nodes
      content:
        nodes:
          - description: Wakes up on Grafana `HighCPU`. Provisions a Hetzner cpx21 and bootstraps the worker.
            label: Autoscale UP
            node: t-alert-up
          - description: Cron-driven. Reclaims the newest node when 30-min avg CPU is quiet.
            label: Autoscale DOWN (every 10 min)
            node: sched-down
            showRun: true
        title: Key Pipelines
    - id: run_status_chart
      type: chart
      content:
        dataSource:
          kind: runs
          limit: 200
        render:
          kind: chart
          legend: show
          series:
            - format: number
              label: Runs
          type: donut
          xField: status
        title: Run outcomes
    - id: recent_runs
      type: table
      content:
        dataSource:
          kind: runs
          limit: 50
        render:
          columns:
            - field: nodeName
              format: code
              label: Trigger
            - field: status
              format: status
              label: Status
            - field: durationMs
              format: duration
              label: Duration
            - field: createdAt
              format: relative
              label: Started
            - field: finishedAt
              format: relative
              label: Finished
          kind: table
        title: Recent Runs (all lanes)
    - id: runbook
      type: markdown
      content:
        body: >
          <details open>

          <summary><strong>Cluster is at max capacity (6/6) and CPU still high</strong></summary>


          1. Confirm the alert: open Grafana and inspect the CPU panel feeding `HighCPU`.

          2. If genuine peak, edit the canvas: bump `check-max` expression from `< 6` to a higher cap, raise Hetzner
          account limits if needed, then publish.

          3. Otherwise investigate the workload — is one host hot? Check the `Query Avg CPU (30m)` output and the
          per-node CPU breakdown in Prometheus.

          4. As a last resort, throttle ingress at your edge (LB rate-limit, feature flag) while you investigate.


          </details>


          <details>

          <summary><strong>Bootstrap Worker failed after provisioning</strong></summary>


          1. Inspect the failed `Bootstrap Worker` execution — grab stderr from the SSH command.

          2. SSH directly to the new node (IP is in the failed run's input) and check:
             ```bash
             systemctl status docker
             docker ps -a
             cat /var/log/cloud-init-output.log
             ```
          3. If Docker is healthy but the workload container failed, fix the `WORKLOAD_IMAGE` / env in the `Bootstrap
          Worker` SSH commands and re-run.

          4. If the node is unrecoverable, delete it from Hetzner and let the next `HighCPU` alert re-provision.


          </details>


          <details>

          <summary><strong>Scale-down deleted the wrong node</strong></summary>


          1. The scale-down picks `values[len(values) - 1]` — the **newest** in memory order. If it picked something
          else, memory ordering is off.

          2. Manually re-provision by firing a test `HighCPU` event in Grafana, or trigger the `Autoscale UP` lane
          directly.

          3. Open an issue to add a `created_at` sort to the scale-down picker.


          </details>


          ### Useful links


          - **Grafana** — your CPU dashboard / alerts page

          - **Hetzner project** — `https://console.hetzner.cloud/projects/<id>/servers`
        title: Operator Runbook
  layout:
    - i: header
      x: 0
      'y': 0
      w: 12
      h: 5
      minW: 4
      minH: 2
    - i: kpis
      x: 0
      'y': 5
      w: 6
      h: 3
      minW: 4
      minH: 3
    - i: cluster_nodes
      x: 0
      'y': 8
      w: 6
      h: 8
      minW: 4
      minH: 4
    - i: key_nodes
      x: 6
      'y': 5
      w: 6
      h: 7
      minW: 4
      minH: 4
    - i: run_status_chart
      x: 6
      'y': 12
      w: 6
      h: 4
      minW: 4
      minH: 4
    - i: recent_runs
      x: 0
      'y': 16
      w: 12
      h: 8
      minW: 4
      minH: 4
    - i: runbook
      x: 0
      'y': 24
      w: 12
      h: 9
      minW: 4
      minH: 4
